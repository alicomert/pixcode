<!--
  Pixcode logo mark — geometric "P" with uniform 4-unit stroke weight.
  - viewBox 24x24 renders sharply at any size (16px, 32px, favicon, 512px PWA).
  - Single path + evenodd fill so the counter (hole) is cut cleanly without
    stacked shapes. Use currentColor if you want the mark tinted by CSS.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="128" height="128" fill="none">
  <path
    fill="#2563eb"
    fill-rule="evenodd"
    clip-rule="evenodd"
    d="M4 3h10a6 6 0 0 1 0 12H8v6H4V3zM8 7h6a2 2 0 0 1 0 4H8V7z"
  />
</svg>
