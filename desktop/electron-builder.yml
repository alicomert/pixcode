# electron-builder config for the Pixcode desktop installer.
# Produces one native installer per OS that bundles Electron + Node +
# the @pixelbyte-software/pixcode npm package + all native deps.
appId: com.pixelbytesoftware.pixcode
productName: Pixcode

directories:
  buildResources: build-resources
  output: dist-installer

# Include our wrapper plus the installed pixcode npm package. node_modules
# contains the server code, the built frontend (via pixcode's own package
# `files`), and the native modules that need to be unpacked from ASAR.
files:
  - "electron/**/*"
  - "build-resources/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/**/*.{md,markdown,txt}"
  - "!node_modules/**/.bin"
  - "!node_modules/**/{test,tests,__tests__,__mocks__,example,examples,docs}"
  - "!node_modules/**/*.{ts,d.ts.map,map}"
  - "!**/node_modules/**/{.editorconfig,.eslintrc*,.prettierrc*,.gitignore,.gitattributes}"
  - "!dist-installer/**"

# ASAR packaging for the app code, but native modules need to live as real
# files so their .node binaries are dlopen-able at runtime.
asar: true
asarUnpack:
  # Native modules must live as real files so their .node binaries are
  # dlopen-able at runtime — ASAR is a virtual FS that can't back dlopen.
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bcrypt/**/*"
  - "node_modules/node-pty/**/*"
  # The pixcode package ships as the seed for our userData runtime dir.
  # Unpacking keeps the copy-on-first-launch step a plain fs walk rather
  # than an asar-fs read (~10x faster and works on all platforms).
  - "node_modules/@pixelbyte-software/pixcode/**/*"

# ---------------------------------------------------------------------------
# Windows — NSIS installer, per-user so no UAC prompt.
# ---------------------------------------------------------------------------
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build-resources/icon.png
  artifactName: "Pixcode-Setup-${version}.${ext}"
  # Unsigned on first ship. SmartScreen will warn on first launch until
  # we add an Authenticode cert (separately, per-release).

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Pixcode
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  installerIcon: build-resources/icon.png
  uninstallerIcon: build-resources/icon.png

# ---------------------------------------------------------------------------
# macOS — universal DMG (arm64 + x64).
# ---------------------------------------------------------------------------
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  icon: build-resources/icon.png
  category: public.app-category.developer-tools
  artifactName: "Pixcode-${version}-${arch}.${ext}"
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  sign: false
  writeUpdateInfo: false

# ---------------------------------------------------------------------------
# Linux — AppImage (universal) + .deb (Debian/Ubuntu).
# ---------------------------------------------------------------------------
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build-resources/icon.png
  category: Development
  synopsis: "Pixcode — unified UI for Claude Code, Codex, Cursor, Gemini & Qwen"
  description: >
    A web UI for Claude Code, Cursor CLI, Codex, Gemini CLI, and Qwen.
    Runs locally; your sessions never leave your machine.
  artifactName: "Pixcode-${version}-${arch}.${ext}"
  desktop:
    # electron-builder 26+ nests freedesktop keys under `entry`. Older
    # versions accepted them at the top level — keep this block in sync
    # with the generated .desktop file specification if we ever upgrade.
    entry:
      Name: Pixcode
      Comment: Web UI for coding agents
      StartupNotify: "false"
      Terminal: "false"
      Type: Application
      Categories: Development;IDE;

deb:
  priority: optional
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libdrm2
    - libgbm1
    - libxcb-dri3-0

# Publish metadata embedded into the installer so electron-updater
# (inside the app) knows where to look for future wrapper updates. The
# `publish: never` CLI flag in the release workflow stops electron-builder
# itself from trying to upload — CI attaches artifacts via
# softprops/action-gh-release to keep us in control of the release notes.
publish:
  provider: github
  owner: alicomert
  repo: pixcode
  releaseType: release
